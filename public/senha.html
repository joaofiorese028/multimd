<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci Minha Senha</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

    <section class="senha-section">

        <h1>Esqueceu sua senha?</h1>

        <p class="subtitle">
            Por favor, informe os dados solicitados abaixo
        </p>

        <div class="senha-box">

            <div class="line"></div>

            <form id="formSenha">

                <div class="form-senha">

                    <div class="campo">
                        <label>Nome:</label>
                        <input type="text" id="nome" placeholder="Digite seu nome" required>
                    </div>

                    <div class="campo">
                        <label>E-mail:</label>
                        <input type="email" id="email" placeholder="Digite seu e-mail" required>
                    </div>

                    <div class="campo">
                        <label>CPF:</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" required>
                    </div>

                </div>

                <div class="buttons">

                    <button type="submit" class="enviar-btn">
                        Enviar
                    </button>

                    <button type="button" class="cancelar-btn" onclick="voltarLogin()">
                        Cancelar
                    </button>

                </div>

            </form>

            <p class="info-text">
                Você receberá um e-mail com as instruções para definir uma nova senha.
                Caso não tenha acesso ao e-mail cadastrado, entre em contato com o suporte.
            </p>

        </div>

    </section>

    <script>
        document.getElementById("formSenha").addEventListener("submit", function(event) {
            event.preventDefault();

            let nome = document.getElementById("nome").value;
            let email = document.getElementById("email").value;
            let cpf = document.getElementById("cpf").value;

            if (nome === "" || email === "" || cpf === "") {
                alert("Preencha todos os campos!");
                return;
            }

            alert("Solicitação enviada com sucesso!");
        });

        function voltarLogin() {
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
