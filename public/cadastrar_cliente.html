<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área de Cadastro</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

    <section class="cadastro-section">
        <h1>Área de Cadastro</h1>
        <p class="subtitle">Preencha os dados abaixo para criar sua conta</p>

        <div class="cadastro-box">
            <h2>Cadastro de Usuário</h2>
            <div class="line"></div>

            <form id="formCadastro">
                <div class="form-area">
                    <div class="left">
                        <input type="text" id="nome" placeholder="Nome completo" required>
                        <input type="email" id="email" placeholder="E-mail" required>
                        <input type="tel" id="telefone" placeholder="Telefone">
                        <input type="text" id="cpf" placeholder="CPF">
                        <input type="password" id="senha" placeholder="Senha" required>
                        <input type="password" id="confirmarSenha" placeholder="Confirmar senha" required>
                    </div>

                    <div class="right">
                        <h3>Informações</h3>
                        <p>Preencha todos os campos corretamente</p>
                        <p>Utilize um e-mail válido</p>
                        <p>Sua senha deve ser segura</p>
                        <p>Confirme a senha para finalizar</p>
                        <p>Seus dados serão protegidos</p>
                    </div>
                </div>

                <button type="submit" class="cadastro-btn">Cadastrar</button>
                <p id="mensagemCadastro" class="mensagem"></p>
            </form>
        </div>
    </section>

    <script src="js/api.js"></script>

    <script>
        const formCadastro = document.getElementById('formCadastro');

        formCadastro.addEventListener('submit', async function(event) {
            event.preventDefault();

            const mensagem = document.getElementById('mensagemCadastro');

            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefone = document.getElementById('telefone').value.trim();
            const cpf = document.getElementById('cpf').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const confirmarSenha = document.getElementById('confirmarSenha').value.trim();

            if (senha !== confirmarSenha) {
                mensagem.textContent = 'As senhas não conferem.';
                return;
            }

            try {
                const cliente = await api('/clientes', {
                    method: 'POST',
                    body: { nome, email, telefone, cpf, senha }
                });

                mensagem.textContent = `Cliente ${cliente.nome} cadastrado com sucesso!`;
                formCadastro.reset();
            } catch (erro) {
                mensagem.textContent = erro.message;
            }
        });
    </script>
</body>
</html>
